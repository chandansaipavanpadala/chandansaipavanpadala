<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 270" width="470" height="270">
  <defs>
    <!-- Glowing background radial gradient -->
    <radialGradient id="bg-glow-jinx" cx="0%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#9b5de5" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#0d1117" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1" />
    </radialGradient>
    
    <!-- Smooth gradient border starting from accent color -->
    <linearGradient id="border-grad-jinx" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b5de5" stop-opacity="1" />
      <stop offset="30%" stop-color="#9b5de5" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#30363d" stop-opacity="0.2" />
    </linearGradient>
  </defs>

  <!-- Solid card background -->
  <rect x="0.5" y="0.5" width="469" height="269" rx="12" fill="#0d1117" />
  
  <!-- Subtle radial glow overlay -->
  <rect x="0.5" y="0.5" width="469" height="269" rx="12" fill="url(#bg-glow-jinx)" />
  
  <!-- Gradient border -->
  <rect x="1" y="1" width="468" height="268" rx="12" fill="none" stroke="url(#border-grad-jinx)" stroke-width="1.8" />

  <!-- Title -->
  <text x="24" y="38" fill="#f0f6fc" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">JINX</text>
  
  <!-- Subtitle -->
  <text x="24" y="58" fill="#9b5de5" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="600">Joint Inverse N-dimensional eXplorer</text>

  <!-- Wrapped Description -->
  <text x="24" y="86" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" line-height="19">
    <tspan x="24" dy="0">An open-source 3D robotic simulator using Three.js and</tspan>
        <tspan x="24" dy="19">Vite, featuring real-time forward and inverse</tspan>
        <tspan x="24" dy="19">kinematics, trajectory planning, and a high-performance</tspan>
        <tspan x="24" dy="19">multi-tab data pipeline streaming 60FPS telemetry via</tspan>
        <tspan x="24" dy="19">BroadcastChannel API.</tspan>
  </text>

  <!-- Project Tech Tags -->
  <g class="tag">
    <rect x="24" y="194" width="69" height="22" rx="11" fill="#9b5de5" fill-opacity="0.12" />
    <text x="58" y="209" fill="#9b5de5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Three.js</text>
  </g>
  <g class="tag">
    <rect x="101" y="194" width="44" height="22" rx="11" fill="#9b5de5" fill-opacity="0.12" />
    <text x="123" y="209" fill="#9b5de5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Vite</text>
  </g>
  <g class="tag">
    <rect x="153" y="194" width="144" height="22" rx="11" fill="#9b5de5" fill-opacity="0.12" />
    <text x="225" y="209" fill="#9b5de5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">BroadcastChannel API</text>
  </g>
  <g class="tag">
    <rect x="305" y="194" width="69" height="22" rx="11" fill="#9b5de5" fill-opacity="0.12" />
    <text x="339" y="209" fill="#9b5de5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Chart.js</text>
  </g>
  <g class="tag">
    <rect x="24" y="224" width="94" height="22" rx="11" fill="#9b5de5" fill-opacity="0.12" />
    <text x="71" y="239" fill="#9b5de5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">GitHub Pages</text>
  </g>
</svg>