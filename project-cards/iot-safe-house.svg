<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 270" width="470" height="270">
  <defs>
    <!-- Glowing background radial gradient -->
    <radialGradient id="bg-glow-iot-safe-house" cx="0%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#ff006e" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#0d1117" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1" />
    </radialGradient>
    
    <!-- Smooth gradient border starting from accent color -->
    <linearGradient id="border-grad-iot-safe-house" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff006e" stop-opacity="1" />
      <stop offset="30%" stop-color="#ff006e" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#30363d" stop-opacity="0.2" />
    </linearGradient>
  </defs>

  <!-- Solid card background -->
  <rect x="0.5" y="0.5" width="469" height="269" rx="12" fill="#0d1117" />
  
  <!-- Subtle radial glow overlay -->
  <rect x="0.5" y="0.5" width="469" height="269" rx="12" fill="url(#bg-glow-iot-safe-house)" />
  
  <!-- Gradient border -->
  <rect x="1" y="1" width="468" height="268" rx="12" fill="none" stroke="url(#border-grad-iot-safe-house)" stroke-width="1.8" />

  <!-- Title -->
  <text x="24" y="38" fill="#f0f6fc" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">IoT Safe House</text>
  
  <!-- Subtitle -->
  <text x="24" y="58" fill="#ff006e" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="600">Integrated Security &amp; Monitoring System</text>

  <!-- Wrapped Description -->
  <text x="24" y="86" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" line-height="19">
    <tspan x="24" dy="0">End-to-end IoT home security solution with real-time</tspan>
        <tspan x="24" dy="19">multi-sensor monitoring, automated mobile alerts, and</tspan>
        <tspan x="24" dy="19">robust cloud synchronization built on Arduino and MIT</tspan>
        <tspan x="24" dy="19">App Inventor.</tspan>
  </text>

  <!-- Project Tech Tags -->
  <g class="tag">
    <rect x="24" y="194" width="63" height="22" rx="11" fill="#ff006e" fill-opacity="0.12" />
    <text x="55" y="209" fill="#ff006e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Arduino</text>
  </g>
  <g class="tag">
    <rect x="95" y="194" width="119" height="22" rx="11" fill="#ff006e" fill-opacity="0.12" />
    <text x="154" y="209" fill="#ff006e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">MIT App Inventor</text>
  </g>
  <g class="tag">
    <rect x="222" y="194" width="88" height="22" rx="11" fill="#ff006e" fill-opacity="0.12" />
    <text x="266" y="209" fill="#ff006e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">IoT Sensors</text>
  </g>
  <g class="tag">
    <rect x="318" y="194" width="75" height="22" rx="11" fill="#ff006e" fill-opacity="0.12" />
    <text x="355" y="209" fill="#ff006e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Bluetooth</text>
  </g>
  <g class="tag">
    <rect x="24" y="224" width="51" height="22" rx="11" fill="#ff006e" fill-opacity="0.12" />
    <text x="49" y="239" fill="#ff006e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Cloud</text>
  </g>
</svg>