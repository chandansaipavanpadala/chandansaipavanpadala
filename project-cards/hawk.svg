<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 270" width="470" height="270">
  <defs>
    <!-- Glowing background radial gradient -->
    <radialGradient id="bg-glow-hawk" cx="0%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#06d6a0" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#0d1117" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1" />
    </radialGradient>
    
    <!-- Smooth gradient border starting from accent color -->
    <linearGradient id="border-grad-hawk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06d6a0" stop-opacity="1" />
      <stop offset="30%" stop-color="#06d6a0" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#30363d" stop-opacity="0.2" />
    </linearGradient>
  </defs>

  <!-- Solid card background -->
  <rect x="0.5" y="0.5" width="469" height="269" rx="12" fill="#0d1117" />
  
  <!-- Subtle radial glow overlay -->
  <rect x="0.5" y="0.5" width="469" height="269" rx="12" fill="url(#bg-glow-hawk)" />
  
  <!-- Gradient border -->
  <rect x="1" y="1" width="468" height="268" rx="12" fill="none" stroke="url(#border-grad-hawk)" stroke-width="1.8" />

  <!-- Title -->
  <text x="24" y="38" fill="#f0f6fc" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">H.A.W.K.</text>
  
  <!-- Subtitle -->
  <text x="24" y="58" fill="#06d6a0" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="600">Human Activity Detection Through Walls</text>

  <!-- Wrapped Description -->
  <text x="24" y="86" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" line-height="19">
    <tspan x="24" dy="0">A real-time through-wall human detection system</tspan>
        <tspan x="24" dy="19">utilizing microwave kinetics and radar principles.</tspan>
        <tspan x="24" dy="19">Features robust telemetry packet extraction and live</tspan>
        <tspan x="24" dy="19">data visualization for continuous, non-invasive activity</tspan>
        <tspan x="24" dy="19">monitoring.</tspan>
  </text>

  <!-- Project Tech Tags -->
  <g class="tag">
    <rect x="24" y="194" width="113" height="22" rx="11" fill="#06d6a0" fill-opacity="0.12" />
    <text x="80" y="209" fill="#06d6a0" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Microwave Radar</text>
  </g>
  <g class="tag">
    <rect x="145" y="194" width="51" height="22" rx="11" fill="#06d6a0" fill-opacity="0.12" />
    <text x="170" y="209" fill="#06d6a0" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">ESP32</text>
  </g>
  <g class="tag">
    <rect x="204" y="194" width="57" height="22" rx="11" fill="#06d6a0" fill-opacity="0.12" />
    <text x="232" y="209" fill="#06d6a0" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Python</text>
  </g>
  <g class="tag">
    <rect x="269" y="194" width="113" height="22" rx="11" fill="#06d6a0" fill-opacity="0.12" />
    <text x="325" y="209" fill="#06d6a0" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Serial Protocol</text>
  </g>
  <g class="tag">
    <rect x="24" y="224" width="131" height="22" rx="11" fill="#06d6a0" fill-opacity="0.12" />
    <text x="89" y="239" fill="#06d6a0" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Data Visualization</text>
  </g>
</svg>