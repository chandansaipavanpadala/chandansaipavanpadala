<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 270" width="470" height="270">
  <defs>
    <!-- Glowing background radial gradient -->
    <radialGradient id="bg-glow-web-based-digital-ic-tester" cx="0%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#0d1117" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1" />
    </radialGradient>
    
    <!-- Smooth gradient border starting from accent color -->
    <linearGradient id="border-grad-web-based-digital-ic-tester" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="1" />
      <stop offset="30%" stop-color="#00b4d8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#30363d" stop-opacity="0.2" />
    </linearGradient>
  </defs>

  <!-- Solid card background -->
  <rect x="0.5" y="0.5" width="469" height="269" rx="12" fill="#0d1117" />
  
  <!-- Subtle radial glow overlay -->
  <rect x="0.5" y="0.5" width="469" height="269" rx="12" fill="url(#bg-glow-web-based-digital-ic-tester)" />
  
  <!-- Gradient border -->
  <rect x="1" y="1" width="468" height="268" rx="12" fill="none" stroke="url(#border-grad-web-based-digital-ic-tester)" stroke-width="1.8" />

  <!-- Title -->
  <text x="24" y="38" fill="#f0f6fc" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">Web-Based Digital IC Tester</text>
  
  <!-- Subtitle -->
  <text x="24" y="58" fill="#00b4d8" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="600">Web Serial API-Based Hardware Validation</text>

  <!-- Wrapped Description -->
  <text x="24" y="86" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" line-height="19">
    <tspan x="24" dy="0">A futuristic web application for mobile IC testing,</tspan>
        <tspan x="24" dy="19">utilizing the Web Serial API. Features a comprehensive</tspan>
        <tspan x="24" dy="19">IC database, interactive truth tables, and pinout</tspan>
        <tspan x="24" dy="19">diagrams for both automated and manual testing,</tspan>
        <tspan x="24" dy="19">bypassing expensive laboratory bench equipment.</tspan>
  </text>

  <!-- Project Tech Tags -->
  <g class="tag">
    <rect x="24" y="194" width="106" height="22" rx="11" fill="#00b4d8" fill-opacity="0.12" />
    <text x="77" y="209" fill="#00b4d8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Web Serial API</text>
  </g>
  <g class="tag">
    <rect x="138" y="194" width="82" height="22" rx="11" fill="#00b4d8" fill-opacity="0.12" />
    <text x="179" y="209" fill="#00b4d8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">JavaScript</text>
  </g>
  <g class="tag">
    <rect x="228" y="194" width="82" height="22" rx="11" fill="#00b4d8" fill-opacity="0.12" />
    <text x="269" y="209" fill="#00b4d8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">HTML5/CSS3</text>
  </g>
  <g class="tag">
    <rect x="318" y="194" width="63" height="22" rx="11" fill="#00b4d8" fill-opacity="0.12" />
    <text x="349" y="209" fill="#00b4d8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Arduino</text>
  </g>
  <g class="tag">
    <rect x="24" y="224" width="82" height="22" rx="11" fill="#00b4d8" fill-opacity="0.12" />
    <text x="65" y="239" fill="#00b4d8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Embedded C</text>
  </g>
</svg>