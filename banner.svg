    <animate attributeName="opacity" values="0.11;0.64;0.11" dur="7s" repeatCount="indefinite" />
  </circle>
  <circle cx="54" cy="23" r="1.7" fill="#00b4d8">
    <animateMotion path="M 0 0 C 38 -1, 32 -28, 3 -15 Z" dur="23s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.14;0.45;0.14" dur="10s" repeatCount="indefinite" />
  </circle>
  <circle cx="1126" cy="100" r="1.3" fill="#00b4d8">
    <animateMotion path="M 0 0 C -23 -12, 4 13, 6 27 Z" dur="27s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.13;0.41;0.13" dur="7s" repeatCount="indefinite" />
  </circle>
  <circle cx="1087" cy="36" r="1.1" fill="#00b4d8">
    <animateMotion path="M 0 0 C -25 -21, 3 -23, 7 -29 Z" dur="29s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.18;0.45;0.18" dur="11s" repeatCount="indefinite" />
  </circle>
  <circle cx="776" cy="151" r="1.7" fill="#00b4d8">
    <animateMotion path="M 0 0 C 30 -17, -24 -1, 29 5 Z" dur="25s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.12;0.48;0.12" dur="8s" repeatCount="indefinite" />
