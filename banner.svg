    <animate attributeName="opacity" values="0.17;0.5;0.17" dur="10s" repeatCount="indefinite" />
  </circle>
  <circle cx="806" cy="58" r="1.9" fill="#00b4d8">
    <animateMotion path="M 0 0 C 2 14, -36 -15, -1 -6 Z" dur="22s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.14;0.45;0.14" dur="7s" repeatCount="indefinite" />
  </circle>
  <circle cx="366" cy="146" r="1.4" fill="#00b4d8">
    <animateMotion path="M 0 0 C -16 26, -5 18, -37 18 Z" dur="21s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.12;0.41;0.12" dur="8s" repeatCount="indefinite" />
  </circle>
  <circle cx="1106" cy="87" r="0.8" fill="#00b4d8">
    <animateMotion path="M 0 0 C 8 -22, -8 7, 38 -7 Z" dur="29s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.15;0.64;0.15" dur="12s" repeatCount="indefinite" />
  </circle>

  <!-- Header Text Group -->
  <g id="header-text">
    <!-- Pulsing glow backdrop behind the name -->
    <text x="600" y="112" fill="#00b4d8" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" text-anchor="middle" filter="url(#text-glow)">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="6s" repeatCount="indefinite" />
      Chandan Sai Pavan Padala
    </text>
    
    <!-- Main foreground name -->
    <text x="600" y="112" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" text-anchor="middle">
      Chandan Sai Pavan Padala
    </text>

    <!-- Subtitle tagline -->
    <text x="600" y="156" fill="#00b4d8" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" text-anchor="middle" style="letter-spacing: 2px;">
      <animate attributeName="opacity" values="0.85;1.0;0.85" dur="8s" repeatCount="indefinite" />
      Embedded Systems | RTOS | Firmware | Defence Tech
    </text>
  </g>
</svg>