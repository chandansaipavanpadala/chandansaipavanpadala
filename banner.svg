<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" width="1200" height="250">
  <defs>
    <!-- Glow filter for pulsing text shadow -->
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Animated gradient mesh components -->
    <radialGradient id="mesh-left" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#0077b6">
        <animate attributeName="stop-color" values="#0077b6;#00b4d8;#0d1117;#0077b6" dur="14s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="mesh-right" cx="80%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#00b4d8">
        <animate attributeName="stop-color" values="#00b4d8;#0d1117;#0077b6;#00b4d8" dur="18s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="mesh-center" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#0077b6;#00b4d8;#0d1117" dur="22s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Base background color -->
  <rect width="1200" height="250" fill="#0d1117" />

  <!-- Overlapping animated gradient mesh layers -->
  <rect width="1200" height="250" fill="url(#mesh-left)" />
  <rect width="1200" height="250" fill="url(#mesh-right)" />
  <rect width="1200" height="250" fill="url(#mesh-center)" />

  <!-- Animated background particles -->
  <circle cx="428" cy="158" r="2.1" fill="#00b4d8">
    <animateMotion path="M 0 0 C 19 -27, 24 -17, 37 -16 Z" dur="24s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.14;0.6;0.14" dur="8s" repeatCount="indefinite" />
  </circle>
  <circle cx="926" cy="38" r="1.2" fill="#00b4d8">
    <animateMotion path="M 0 0 C -20 -25, 16 19, 28 -7 Z" dur="21s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.14;0.48;0.14" dur="11s" repeatCount="indefinite" />
  </circle>
  <circle cx="857" cy="128" r="1.1" fill="#00b4d8">
    <animateMotion path="M 0 0 C 15 -1, -2 -17, -26 11 Z" dur="34s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.16;0.57;0.16" dur="8s" repeatCount="indefinite" />
  </circle>
  <circle cx="838" cy="220" r="1.3" fill="#00b4d8">
    <animateMotion path="M 0 0 C 14 -26, 11 17, 13 -30 Z" dur="29s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.11;0.42;0.11" dur="12s" repeatCount="indefinite" />
  </circle>
  <circle cx="74" cy="114" r="1.8" fill="#00b4d8">
