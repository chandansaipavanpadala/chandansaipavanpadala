    <animate attributeName="opacity" values="0.09;0.44;0.09" dur="8s" repeatCount="indefinite" />
  </circle>
  <circle cx="721" cy="116" r="0.9" fill="#00b4d8">
    <animateMotion path="M 0 0 C 30 5, 4 -1, -33 -18 Z" dur="23s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.16;0.48;0.16" dur="8s" repeatCount="indefinite" />
  </circle>
  <circle cx="345" cy="84" r="1.5" fill="#00b4d8">
