    <animate attributeName="opacity" values="0.1;0.42;0.1" dur="7s" repeatCount="indefinite" />
  </circle>
  <circle cx="858" cy="195" r="2.2" fill="#00b4d8">
    <animateMotion path="M 0 0 C 6 27, 32 0, -19 1 Z" dur="31s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.12;0.62;0.12" dur="11s" repeatCount="indefinite" />
  </circle>
  <circle cx="1116" cy="194" r="2.0" fill="#00b4d8">
    <animateMotion path="M 0 0 C -30 -26, -36 6, 4 4 Z" dur="29s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.18;0.43;0.18" dur="11s" repeatCount="indefinite" />
  </circle>
  <circle cx="973" cy="222" r="1.7" fill="#00b4d8">
