<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Soft glow filter for the central core initials -->
    <filter id="core-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Glowing filter for node borders -->
    <filter id="node-glow-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
    </filter>

    <!-- Node drop shadow -->
    <filter id="node-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Radial gradient for background space glow -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </radialGradient>

    <!-- Central core gradient -->
    <radialGradient id="core-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.25" />
      <stop offset="70%" stop-color="#0077b6" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Dark Space Background -->
  <rect width="800" height="800" fill="#0d1117" rx="24" />
  
  <!-- Subtle cosmic background glow -->
  <circle cx="400" cy="400" r="350" fill="url(#bg-glow)" />

  <!-- Dotted Orbit Track ring for reference -->
  <circle cx="400" cy="400" r="250" fill="none" stroke="#00b4d8" stroke-opacity="0.08" stroke-width="2" stroke-dasharray="6 6" />

  <!-- Dynamic Rotating Data lines (synced exactly with the duration of the nodes) -->
  <g>
    <!-- Rotate group clockwise around center -->
    <animateTransform attributeName="transform" type="rotate" from="0 400 400" to="360 400 400" dur="25s" repeatCount="indefinite" />
    <line x1="400" y1="400" x2="400" y2="150" transform="rotate(0 400 400)" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1.8" stroke-dasharray="8 12">
      <animate attributeName="stroke-dashoffset" values="40;0" dur="2s" repeatCount="indefinite" />
    </line>
    <line x1="400" y1="400" x2="400" y2="150" transform="rotate(45 400 400)" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1.8" stroke-dasharray="8 12">
      <animate attributeName="stroke-dashoffset" values="40;0" dur="2s" repeatCount="indefinite" />
    </line>
    <line x1="400" y1="400" x2="400" y2="150" transform="rotate(90 400 400)" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1.8" stroke-dasharray="8 12">
      <animate attributeName="stroke-dashoffset" values="40;0" dur="2s" repeatCount="indefinite" />
    </line>
    <line x1="400" y1="400" x2="400" y2="150" transform="rotate(135 400 400)" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1.8" stroke-dasharray="8 12">
      <animate attributeName="stroke-dashoffset" values="40;0" dur="2s" repeatCount="indefinite" />
    </line>
    <line x1="400" y1="400" x2="400" y2="150" transform="rotate(180 400 400)" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1.8" stroke-dasharray="8 12">
      <animate attributeName="stroke-dashoffset" values="40;0" dur="2s" repeatCount="indefinite" />
    </line>
    <line x1="400" y1="400" x2="400" y2="150" transform="rotate(225 400 400)" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1.8" stroke-dasharray="8 12">
      <animate attributeName="stroke-dashoffset" values="40;0" dur="2s" repeatCount="indefinite" />
    </line>
    <line x1="400" y1="400" x2="400" y2="150" transform="rotate(270 400 400)" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1.8" stroke-dasharray="8 12">
      <animate attributeName="stroke-dashoffset" values="40;0" dur="2s" repeatCount="indefinite" />
    </line>
    <line x1="400" y1="400" x2="400" y2="150" transform="rotate(315 400 400)" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1.8" stroke-dasharray="8 12">
      <animate attributeName="stroke-dashoffset" values="40;0" dur="2s" repeatCount="indefinite" />
    </line>
  </g>

  <!-- Central Glowing Processor Core -->
  <g id="core-group">
    <!-- Radial fill glow -->
    <circle cx="400" cy="400" r="80" fill="url(#core-gradient)" />
    
    <!-- Outer core glowing breathing shell -->
    <circle cx="400" cy="400" r="70" fill="none" stroke="#00b4d8" stroke-width="2.5" opacity="0.8">
      <animate attributeName="r" values="70;82;70" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite" />
    </circle>
    
    <!-- Solid inner core boundary -->
    <circle cx="400" cy="400" r="68" fill="#111827" stroke="#0077b6" stroke-width="1.5" />
    
    <!-- Central Initials with subtle glow -->
    <text x="400" y="410" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" text-anchor="middle" letter-spacing="3px" filter="url(#core-glow)">
      PCSP
    </text>
  </g>

  <!-- Orbiting Tech stack nodes -->

  <!-- Orbiting Node: C -->
  <g>
    <!-- Animate along its custom offset circle path -->
    <animateMotion path="M 400.00,150.00 A 250,250 0 1,1 400.00,650.00 A 250,250 0 1,1 400.00,150.00 Z" dur="25s" repeatCount="indefinite" />
    
    <!-- Outer glassmorphism glowing circle bounds -->
    <circle cx="0" cy="0" r="32" fill="#151d28" fill-opacity="0.95" stroke="#00b4d8" stroke-width="1.5" filter="url(#node-shadow)" />
    <circle cx="0" cy="0" r="32" fill="none" stroke="#00b4d8" stroke-width="4" stroke-opacity="0.25" filter="url(#node-glow-blur)" />
    
    <!-- Render the graphics centered at (0,0) -->
    <g transform="translate(-13, -13) scale(1.08)"><path fill="#00b4d8" d="M24 0c-13.255 0-24 10.745-24 24s10.745 24 24 24c5.632 0 10.796-1.944 14.88-5.184l-4.128-4.128c-3.072 2.304-6.864 3.712-10.752 3.712-9.264 0-16.8-7.536-16.8-16.8s7.536-16.8 16.8-16.8c3.888 0 7.68 1.408 10.752 3.712l4.128-4.128c-4.084-3.24-9.248-5.184-14.88-5.184z" /></g>
    
    <!-- Label shown on hover or subtly below -->
    <text x="0" y="46" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.5px">C</text>
  </g>
  <!-- Orbiting Node: ESP32 -->
  <g>
    <!-- Animate along its custom offset circle path -->
    <animateMotion path="M 576.78,223.22 A 250,250 0 1,1 223.22,576.78 A 250,250 0 1,1 576.78,223.22 Z" dur="25s" repeatCount="indefinite" />
    
    <!-- Outer glassmorphism glowing circle bounds -->
    <circle cx="0" cy="0" r="32" fill="#151d28" fill-opacity="0.95" stroke="#00b4d8" stroke-width="1.5" filter="url(#node-shadow)" />
    <circle cx="0" cy="0" r="32" fill="none" stroke="#00b4d8" stroke-width="4" stroke-opacity="0.25" filter="url(#node-glow-blur)" />
    
    <!-- Render the graphics centered at (0,0) -->
    
    <!-- Chip body -->
    <rect x="-14" y="-14" width="28" height="28" rx="3" fill="#1f2937" stroke="#00b4d8" stroke-width="1.5" />
    <!-- Outer pins -->
    <path d="M-10 -16 V-14 M-5 -16 V-14 M0 -16 V-14 M5 -16 V-14 M10 -16 V-14
             M-10 14 V16 M-5 14 V16 M0 14 V16 M5 14 V16 M10 14 V16
             M-16 -10 H-14 M-16 -5 H-14 M-16 0 H-14 M-16 5 H-14 M-16 10 H-14
             M14 -10 H16 M14 -5 H16 M14 0 H16 M14 5 H16 M14 10 H16" 
          stroke="#00b4d8" stroke-width="1.2" stroke-linecap="round" />
    <!-- WiFi signal icon -->
    <path d="M-4 -3 A 6 6 0 0 1 4 -3 M-2.5 -1.2 A 3.8 3.8 0 0 1 2.5 -1.2 M-1 .5 A 1.5 1.5 0 0 1 1 .5" fill="none" stroke="#00b4d8" stroke-width="1" stroke-linecap="round" />
    <!-- Text label inside chip -->
    <text x="0" y="8" fill="#ffffff" font-family="system-ui, sans-serif" font-size="6" font-weight="800" text-anchor="middle" letter-spacing="0.5px">ESP32</text>
    
    
    <!-- Label shown on hover or subtly below -->
    <text x="0" y="46" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.5px">ESP32</text>
  </g>
  <!-- Orbiting Node: C++ -->
  <g>
    <!-- Animate along its custom offset circle path -->
    <animateMotion path="M 650.00,400.00 A 250,250 0 1,1 150.00,400.00 A 250,250 0 1,1 650.00,400.00 Z" dur="25s" repeatCount="indefinite" />
    
