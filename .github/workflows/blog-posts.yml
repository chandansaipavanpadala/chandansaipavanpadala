name: Update Blog Posts

on:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual run via GitHub UI

permissions:
  contents: write # Required for the action to commit and push changes back to the repository

jobs:
  update-blog-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Blog Posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # INSTRUCTIONS: Replace the RSS feed URLs below with your own blog feeds.
          # You can list multiple comma-separated feeds or just one.
          # Examples:
          #   - Dev.to: https://dev.to/feed/your_username
          #   - Medium: https://medium.com/feed/@your_username
          #   - Hashnode: https://your_username.hashnode.dev/rss.xml
          feed_list: "https://dev.to/feed/chandansaipavanpadala,https://medium.com/feed/@chandansaipavanpadala"
          max_post_count: 5
          comment_tag_name: "BLOG-POST-LIST"
