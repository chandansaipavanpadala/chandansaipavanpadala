<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <!-- Soft drop shadow for terminal window -->
    <filter id="window-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.55" />
    </filter>
  </defs>

  <!-- Dark Space Canvas -->
  <rect width="600" height="300" fill="#0d1117" rx="16" />

  <!-- Terminal Window Chrome with Drop Shadow -->
  <g filter="url(#window-shadow)">
    <!-- Base body panel -->
    <rect x="20" y="20" width="560" height="260" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1.2" />
    
    <!-- Header bar panel with top rounded corners -->
    <path d="M 20.6 20.6 L 579.4 20.6 A 9.4 9.4 0 0 1 579.4 50 L 20.6 50 A 9.4 9.4 0 0 1 20.6 20.6 Z" fill="#161b22" />
    <!-- Header dividing line -->
    <line x1="20" y1="50" x2="580" y2="50" stroke="#30363d" stroke-width="1.2" />

    <!-- macOS Traffic Lights (Red, Yellow, Green) -->
    <circle cx="45" cy="35" r="6" fill="#ff5f56" />
    <circle cx="65" cy="35" r="6" fill="#ffbd2e" />
    <circle cx="85" cy="35" r="6" fill="#27c93f" />

    <!-- Window Title -->
    <text x="300" y="39" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.5px">bash — whoami — 80×24</text>
  </g>

  <!-- Monospace CLI Text Contents -->
  <!-- Using Fira Code, Courier New, Consolas, or general monospace for terminal style -->
  <g font-family="'Fira Code', 'Consolas', 'Courier New', Courier, monospace" font-size="14" font-weight="500">
    <!-- Line 1: $ whoami -->
    <text x="40" y="80" fill="#ffffff">
      <tspan opacity="0" fill="#00b4d8">$<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.020;0.025;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0" fill="#00b4d8"> <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.030;0.035;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">w<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.040;0.045;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">h<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.050;0.055;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">o<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.060;0.065;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">a<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.070;0.075;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">m<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.080;0.085;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">i<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.090;0.095;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan fill="#00b4d8" opacity="0">█<animate attributeName="opacity" values="0;0;1;0;1;0;0" keyTimes="0;0.020;0.021;0.050;0.080;0.110;1" dur="10.0s" repeatCount="indefinite" /></tspan>
    </text>

    <!-- Line 2: Output -->
    <text x="40" y="110">
      <g opacity="0"><tspan fill="#ffffff">Chandan Sai Pavan Padala</tspan><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.130;0.135;0.850;1" dur="10.0s" repeatCount="indefinite" /></g>
    </text>

    <!-- Line 3: $ cat skills.txt -->
    <text x="40" y="140" fill="#ffffff">
      <tspan opacity="0" fill="#00b4d8">$<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.170;0.175;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0" fill="#00b4d8"> <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.180;0.185;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">c<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.190;0.195;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">a<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.198;0.203;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">t<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.206;0.211;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0"> <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.214;0.219;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">s<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.222;0.227;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">k<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.230;0.235;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">i<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.238;0.243;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">l<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.246;0.251;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">l<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.254;0.259;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">s<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.262;0.267;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">.<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.270;0.275;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">t<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.278;0.283;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">x<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.286;0.291;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">t<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.294;0.299;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan fill="#00b4d8" opacity="0">█<animate attributeName="opacity" values="0;0;1;0;1;0;1;0;0" keyTimes="0;0.170;0.171;0.210;0.250;0.290;0.330;0.340;1" dur="10.0s" repeatCount="indefinite" /></tspan>
    </text>

    <!-- Line 4: Output -->
    <text x="40" y="170">
      <g opacity="0"><tspan fill="#8b949e">FreeRTOS, ESP32, STM32, ARM Cortex-M4...</tspan><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.350;0.355;0.850;1" dur="10.0s" repeatCount="indefinite" /></g>
    </text>

    <!-- Line 5: $ status -->
    <text x="40" y="200" fill="#ffffff">
      <tspan opacity="0" fill="#00b4d8">$<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.390;0.395;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0" fill="#00b4d8"> <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.400;0.405;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">s<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.410;0.415;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">t<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.420;0.425;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">a<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.430;0.435;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">t<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.440;0.445;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">u<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.450;0.455;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan opacity="0">s<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.460;0.465;0.850;1" dur="10.0s" repeatCount="indefinite" /></tspan><tspan fill="#00b4d8" opacity="0">█<animate attributeName="opacity" values="0;0;1;0;1;0;0" keyTimes="0;0.390;0.391;0.420;0.450;0.480;0.490;1" dur="10.0s" repeatCount="indefinite" /></tspan>
    </text>

    <!-- Line 6: Output -->
    <text x="40" y="230">
      <g opacity="0"><tspan fill="#8b949e">Building defence-grade embedded systems...</tspan><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.500;0.505;0.850;1" dur="10.0s" repeatCount="indefinite" /></g>
    </text>

    <!-- Line 7: Final active prompt -->
    <text x="40" y="260">
      <g opacity="0"><tspan fill="#00b4d8">$ </tspan><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.540;0.545;0.850;1" dur="10.0s" repeatCount="indefinite" /></g><tspan fill="#00b4d8" opacity="0">█<animate attributeName="opacity" values="0;0;1;0;1;0;1;0;0" keyTimes="0;0.540;0.550;0.620;0.700;0.780;0.850;0.860;1" dur="10.0s" repeatCount="indefinite" /></tspan>
    </text>
  </g>
</svg>